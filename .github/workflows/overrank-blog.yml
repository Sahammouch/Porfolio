name: Build overrank blog
on:
  schedule:
    - cron: "0 14 * * *"
  workflow_dispatch: {}
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: node overrank-blog.mjs
      - name: Commit generated pages
        run: |
          git config user.name "overrank-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add blog
          git diff --staged --quiet || git commit -m "Update blog from overrank"
          git push
